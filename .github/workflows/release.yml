name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version label for the draft release (e.g. v1.0.0)"
        required: true
        default: "v0.0.0-test"

env:
  GODOT_VERSION: "4.6.2"
  GODOT_RELEASE: "4.6.2-stable"

jobs:
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install scons
        run: pip3 install --break-system-packages scons

      - name: Build native (release + debug, universal)
        run: |
          for target in template_release template_debug; do
            scons platform=macos target=$target arch=arm64 -j$(sysctl -n hw.ncpu)
            scons platform=macos target=$target arch=x86_64 -j$(sysctl -n hw.ncpu)
            lipo -create \
              bin/libmesher_native.macos.$target.arm64.dylib \
              bin/libmesher_native.macos.$target.x86_64.dylib \
              -output bin/libmesher_native.macos.$target.universal.dylib
          done
          ls -la bin/

      - name: Install Godot + export templates
        run: |
          set -e
          GODOT_ZIP="Godot_v${GODOT_RELEASE}_macos.universal.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_RELEASE}_export_templates.tpz"
          curl -fL "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${GODOT_ZIP}" -o godot.zip
          unzip -q godot.zip
          mv "Godot.app" "/Applications/Godot.app"
          curl -fL "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${TEMPLATES_TPZ}" -o templates.tpz
          TPL_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL_DIR"
          unzip -q templates.tpz
          mv templates/* "$TPL_DIR/"
          ls "$TPL_DIR" | head

      - name: Import project (warms .godot cache)
        run: |
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . --import || true
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . --import

      - name: Export macOS (.app bundle)
        run: |
          mkdir -p exports/macos
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . \
            --export-release "macOS" exports/macos/VibezCraft.app
          ls -la exports/macos/

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG (drag-to-Applications)
        run: |
          cd exports/macos
          # Stage the .app into a dedicated source folder so create-dmg
          # only sees what we want shown in the DMG window.
          mkdir -p dmg_src
          cp -R VibezCraft.app dmg_src/
          create-dmg \
            --volname "Install VibezCraft" \
            --volicon "../../assets/icon/app_icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VibezCraft.app" 150 200 \
            --hide-extension "VibezCraft.app" \
            --app-drop-link 450 200 \
            "VibezCraft-macOS-universal.dmg" \
            "dmg_src/"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibezcraft-macos
          path: exports/macos/VibezCraft-macOS-universal.dmg
          if-no-files-found: error

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install scons
        run: python -m pip install scons

      - name: Build native (release + debug)
        shell: bash
        run: |
          scons platform=windows target=template_release arch=x86_64 -j$(nproc)
          scons platform=windows target=template_debug arch=x86_64 -j$(nproc)
          ls bin/

      - name: Install Godot + export templates
        shell: bash
        run: |
          set -e
          GODOT_ZIP="Godot_v${GODOT_RELEASE}_win64.exe.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_RELEASE}_export_templates.tpz"
          curl -fL "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${GODOT_ZIP}" -o godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_RELEASE}_win64.exe" godot.exe
          curl -fL "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${TEMPLATES_TPZ}" -o templates.tpz
          TPL_DIR="$APPDATA/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL_DIR"
          unzip -q templates.tpz
          mv templates/* "$TPL_DIR/"
          ls "$TPL_DIR" | head

      - name: Import project (warms .godot cache)
        shell: bash
        run: |
          ./godot.exe --headless --path . --import || true
          ./godot.exe --headless --path . --import

      - name: Export Windows
        shell: bash
        run: |
          mkdir -p exports/windows
          ./godot.exe --headless --path . \
            --export-release "Windows Desktop" exports/windows/VibezCraft.exe
          ls -la exports/windows/

      - name: Bundle portable ZIP
        shell: bash
        run: |
          cd exports/windows
          7z a VibezCraft-Windows-x86_64.zip VibezCraft.exe VibezCraft.console.exe VibezCraft.pck 2>/dev/null || \
          7z a VibezCraft-Windows-x86_64.zip *
          ls -la

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: bash
        run: |
          # Stage the exported files + icon next to the .nsi so File
          # statements resolve with relative paths.
          cp installer/windows.nsi exports/windows/
          cp assets/icon/app_icon.ico exports/windows/
          # Tag-driven version label; strip the leading "v" if present.
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="0.0.0"
          fi
          cd exports/windows
          # NSIS installs under either Program Files or Program Files (x86)
          # depending on host bitness; pick whichever exists.
          MAKENSIS="/c/Program Files (x86)/NSIS/makensis.exe"
          if [ ! -f "$MAKENSIS" ]; then
            MAKENSIS="/c/Program Files/NSIS/makensis.exe"
          fi
          "$MAKENSIS" -DAPP_VERSION="$VERSION" windows.nsi
          ls -la VibezCraft-Windows-Setup.exe VibezCraft-Windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibezcraft-windows
          path: |
            exports/windows/VibezCraft-Windows-x86_64.zip
            exports/windows/VibezCraft-Windows-Setup.exe
          if-no-files-found: error

  release:
    name: Draft GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: vibezcraft-macos
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: vibezcraft-windows
          path: dist/

      - name: Determine tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -la dist/
          gh release create "${{ steps.tag.outputs.tag }}" \
            --draft \
            --title "VibezCraft ${{ steps.tag.outputs.tag }}" \
            --notes-file .github/RELEASE_NOTES.md \
            dist/*.dmg dist/*.zip dist/*.exe
